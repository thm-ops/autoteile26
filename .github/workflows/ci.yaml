name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Run tests
        run: npm test

  lint:
    name: Linting
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build:shared

      - name: Run linter
        run: npm run lint

  build:
    name: Builder
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: npm run setup

      - name: Build shared
        run: npm run build:shared

      - name: Build packages
        run: npm run build

  health:
    name: Health-Check
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Create CI env file
        run: cp .env.default .env

      - name: Build and start service
        run: docker compose up -d --build service

      - name: Wait for service health
        run: |
          container_id="$(docker compose ps -q service)"

          for attempt in {1..30}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' "$container_id")"

            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            if [ "$status" = "unhealthy" ]; then
              docker inspect --format='{{json .State.Health}}' "$container_id"
              docker compose logs service
              exit 1
            fi

            sleep 2
          done

          docker inspect --format='{{json .State.Health}}' "$container_id"
          docker compose logs service
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down --volumes
