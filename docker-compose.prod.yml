services:
  app-prod:
    image: ${PROD_IMAGE_NAME}
    container_name: ${PROD_CONTAINER_NAME}

    build:
      context: .
      dockerfile: packages/apps/web/Dockerfile.prod
      args:
        NODE_VERSION: ${NODE_VERSION}
        DISTROLESS_NODE_IMAGE: ${DISTROLESS_NODE_IMAGE}
        APP_PORT: ${APP_PORT}

    restart: unless-stopped
    depends_on:
      app-service-prod:
        condition: service_healthy
    ports:
      - "${HOST_PORT_PROD}:${APP_PORT}"

    environment:
      NODE_ENV: ${NODE_ENV_PROD}
      HOSTNAME: ${APP_HOSTNAME}
      PORT: ${APP_PORT}
      API_BASE_URL: ${API_BASE_URL_PROD}

    command:
      - node_modules/next/dist/bin/next
      - start
      - packages/apps/web
      - -H
      - ${APP_HOSTNAME}
      - -p
      - "${APP_PORT}"

  app-service-prod:
    build:
      context: .
      dockerfile: packages/apps/service/Dockerfile.prod
      args:
        NODE_VERSION: ${NODE_VERSION}
        DIRSTROLESS_NODE_IMAGE: ${DISTROLESS_NODE_IMAGE}
    env_file:
      - .env
    depends_on:
      db-prod:
        condition: service_healthy
    ports:
      - "8088:3000"
    environment:
      NODE_ENV: production

  db-prod:
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_USER: ${POSTGRES_USER_PROD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PROD}
      POSTGRES_DB: ${POSTGRES_DB_PROD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_PROD} -d ${POSTGRES_DB_PROD} -h localhost -p ${POSTGRES_PORT_PROD}"]
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    ports:
      - "5434:${POSTGRES_PORT_PROD}"

volumes:
  pgdata-prod:
