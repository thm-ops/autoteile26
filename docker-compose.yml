services:
  next:
    build:
      context: .
      dockerfile: packages/apps/web/Dockerfile
      # Next.js embeds public variables while building the client bundle.
      args:
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
    restart: unless-stopped
    environment:
      PORT: ${NEXT_PORT}
      HOSTNAME: ${NEXT_HOST}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - service
  service:
    build:
      context: .
      dockerfile: packages/apps/service/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      # The service reaches PostgreSQL through the Compose network.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      # PayPal is called from the backend; the secret never reaches the client.
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:
