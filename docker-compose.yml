services:
  next:
    build:
      context: .
      dockerfile: packages/apps/web/Dockerfile
      # Next.js embeds public variables while building the client bundle.
      args:
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
        # Baked into the same-origin rewrites at build time. Reaches the
        # service over the Compose network (container listens on 3000).
        API_PROXY_TARGET: http://service:3000
    restart: unless-stopped
    environment:
      PORT: ${NEXT_PORT}
      HOSTNAME: ${NEXT_HOST}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Read at runtime for the server-side NextAuth login fetch.
      API_PROXY_TARGET: http://service:3000
    ports:
      - 3000:3000
    depends_on:
      - postgres
      - service
  service:
    build:
      context: .
      dockerfile: packages/apps/service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # The service reaches PostgreSQL through the Compose network.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # In prod the service listens on 3000 inside the container (dev uses 3001
      # on the host). It is not published: the browser reaches it same-origin
      # through the Next proxy, so no host port and no CORS are needed.
      SERVICE_PORT: 3000
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
volumes:
  pgdata:
