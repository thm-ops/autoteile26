services:
  next:
    build:
      context: .
      dockerfile: packages/apps/web/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${NEXT_PORT}
      HOSTNAME: ${NEXT_HOST}
    ports:
      - 3000:3000
    depends_on:
      - pgdata
  pgdata:
    image: postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: